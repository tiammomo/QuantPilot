name: Quality

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm run test:unit

      - name: Type check
        run: npm run type-check

      - name: AI provider boundary
        run: npm run check:ai-provider-boundary

      - name: Skills integrity
        run: npm run check:skills

      - name: Documentation links
        run: npm run check:docs

      - name: Generated artifact policy
        run: npm run check:generated-artifacts

      - name: Quant guardrails
        run: npm run check:quant-guardrails

      - name: Backend architecture guardrails
        run: npm run check:backend-architecture

      - name: Service catalog guardrails
        run: npm run check:service-catalog

      - name: Benchmark coverage
        run: npm run check:benchmark-coverage

      - name: Evaluation dataset and snapshot contracts
        run: npm run check:eval-datasets

      - name: Evaluator mutation kill-rate
        run: npm run check:eval-mutations

      - name: Judge calibration pipeline
        run: npm run check:eval-judge-calibration

      - name: Eval schedule contract
        run: npm run check:eval-schedule

      - name: Build
        run: npm run build

  backend-market-data:
    name: Backend Market Data
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: services/market-data
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Setup Python
        run: uv python install 3.14

      - name: Install dependencies
        run: uv sync --locked --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

  contract-evaluation:
    name: Quant contract evaluation
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      DATABASE_URL: postgresql://quantpilot:quantpilot_dev_password@127.0.0.1:35433/quantpilot?schema=public
      REDIS_URL: redis://127.0.0.1:36380/0
      QUANTPILOT_MARKET_API_URL: http://127.0.0.1:8000
      PROJECTS_DIR: ./tmp/contract-projects
      QUANTPILOT_EVAL_MODE: contract
      QUANTPILOT_EVAL_TRIGGER: ci
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: |
          npm ci
          npx playwright install --with-deps chromium
          uv sync --project services/market-data --locked --all-groups
          npm run prisma:generate

      - name: Start local data services
        run: |
          docker compose up -d --wait timescaledb redis
          npm run db:init
          mkdir -p tmp
          npm run dev:market > tmp/contract-market.log 2>&1 &
          for attempt in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8000/health >/dev/null; then
              exit 0
            fi
            sleep 2
          done
          tail -100 tmp/contract-market.log
          exit 1

      - name: Run deterministic contract suite
        run: npm run benchmark:quant:contract

      - name: MoAgent PostgreSQL fencing integration
        env:
          MOAGENT_TEST_DATABASE_URL: ${{ env.DATABASE_URL }}
        run: npm run test:moagent:postgres

      - name: Enforce contract gate
        run: npm run eval:ci -- --min-pass-rate 100 --min-average-score 90 --min-first-pass-rate 100 --max-repair-rate 0 --min-stability-rate 100 --min-stability-confidence-lower 75 --max-score-standard-deviation 0

      - name: Upload contract evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quant-contract-evidence-${{ github.run_id }}
          if-no-files-found: warn
          retention-days: 14
          path: |
            tmp/quantpilot-benchmark-reports/
            tmp/quantpilot-benchmark-screenshots/
            tmp/quantpilot-eval-mutations/
            tmp/contract-market.log

      - name: Stop infrastructure
        if: always()
        run: docker compose down -v
